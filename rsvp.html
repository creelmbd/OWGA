<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OWGA Golf League - RSVP</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="apple-touch-icon" sizes="180x180" href="imgs/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="imgs/favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="imgs/favicon/favicon-96x96.png">
  <link rel="shortcut icon" href="imgs/favicon/favicon.ico">
  <link rel="manifest" href="imgs/favicon/site.webmanifest">
  <meta name="theme-color" content="#0b1120">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="scripts.js" defer></script>
  <style>
    .rsvp-wrap {
      padding: 2.5rem 5%;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Toolbar ── */
    .rsvp-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .rsvp-toolbar-left h2 { margin-bottom: 0.2rem; }
    .rsvp-meta {
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.3rem;
    }
    .rsvp-meta i { color: var(--gold-muted); margin-right: 0.3rem; }
    .rsvp-updated { font-size: 0.75rem; color: var(--muted); }

    .btn-sheet {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      border: 1px solid var(--gold-muted);
      color: var(--gold);
      padding: 0.55rem 1.1rem;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-decoration: none;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-sheet:hover { background: var(--gold-glow); }
    .btn-sheet i { font-size: 0.85rem; }

    /* ── Legend ── */
    .rsvp-legend {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
      font-size: 0.76rem;
    }
    .legend-chip {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .lc-dot {
      width: 10px; height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Tee-time banner ── */
    .tee-banner {
      background: rgba(201,168,76,0.08);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 0.65rem 1rem;
      font-size: 0.82rem;
      color: var(--gold);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .tee-banner i { flex-shrink: 0; }

    /* ── Table wrapper ── */
    .rsvp-scroll {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--navy-card);
    }

    .rsvp-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--sans);
      font-size: 0.8rem;
      min-width: 900px;
    }

    /* Header row */
    .rsvp-table thead tr th {
      background: rgba(201,168,76,0.08);
      border-bottom: 1px solid var(--border-strong);
      padding: 0.6rem 0.5rem;
      white-space: nowrap;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
    }
    .rsvp-table thead tr th.col-player {
      text-align: left;
      padding-left: 1rem;
      min-width: 140px;
    }
    .rsvp-table thead tr th.col-champ {
      color: var(--gold-bright);
      background: rgba(201,168,76,0.14);
      border-left: 1px solid var(--border-strong);
    }
    .rsvp-table thead tr th.col-count {
      min-width: 38px;
      color: var(--muted);
      font-size: 0.6rem;
    }

    /* Sub-header (date row) */
    .rsvp-table .date-row th {
      background: rgba(201,168,76,0.04);
      color: var(--muted);
      font-size: 0.64rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 0.35rem 0.5rem;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .rsvp-table .date-row th.col-player { text-align: left; padding-left: 1rem; }

    /* Body rows */
    .rsvp-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.12s;
    }
    .rsvp-table tbody tr:last-child { border-bottom: none; }
    .rsvp-table tbody tr:hover { background: rgba(255,255,255,0.025); }

    /* Alternating rows */
    .rsvp-table tbody tr:nth-child(even) { background: rgba(255,255,255,0.015); }
    .rsvp-table tbody tr:nth-child(even):hover { background: rgba(255,255,255,0.03); }

    .rsvp-table td {
      padding: 0.45rem 0.4rem;
      text-align: center;
      vertical-align: middle;
    }
    .rsvp-table td.col-player {
      text-align: left;
      padding-left: 1rem;
      font-weight: 500;
      color: var(--white);
      white-space: nowrap;
    }
    .rsvp-table td.col-count {
      font-family: var(--serif-display);
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* RSVP status cells */
    .rsvp-cell {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      padding: 0.2rem 0.45rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .rsvp-yes  { background: rgba(60,160,80,0.18);  color: #72d48a; }
    .rsvp-no   { background: rgba(200,60,60,0.2);   color: #e07878; }
    .rsvp-ttd  { background: rgba(230,160,20,0.18); color: #e8b84a; }
    .rsvp-empty { color: rgba(255,255,255,0.15); font-size: 0.7rem; }

    /* Championship column styling */
    .col-champ-cell {
      border-left: 1px solid var(--border);
    }

    /* ── Footer / counts ── */
    .rsvp-table tfoot tr td {
      padding: 0.5rem 0.4rem;
      border-top: 1px solid var(--border-strong);
      font-size: 0.75rem;
      font-weight: 600;
      text-align: center;
      color: var(--muted);
      background: rgba(201,168,76,0.04);
    }
    .rsvp-table tfoot tr td.col-player {
      text-align: left;
      padding-left: 1rem;
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .count-yes  { color: #72d48a; }
    .count-no   { color: #e07878; }
    .count-open { color: var(--muted); }
    .count-row-label { color: var(--muted); }

    /* ── Loading / error states ── */
    .rsvp-state {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--muted);
    }
    .rsvp-state i { font-size: 2rem; display: block; margin-bottom: 1rem; color: var(--border-strong); }
    .rsvp-state p { font-size: 0.9rem; }
    .rsvp-state a { color: var(--gold); }

    @media (max-width: 700px) {
      .rsvp-wrap { padding: 1.5rem 4%; }
      .rsvp-toolbar { flex-direction: column; align-items: flex-start; }
    }

    /* ── Tabs ── */
    .rsvp-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .rsvp-tab {
      padding: 0.65rem 1.4rem;
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .rsvp-tab.active { color: var(--gold-bright); border-bottom-color: var(--gold-bright); }
    .rsvp-tab:hover:not(.active) { color: var(--cream); }
    .rsvp-panel { display: none; }
    .rsvp-panel.active { display: block; }

    /* ── Pairings ── */
    .pairings-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .pairings-round-tag {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      background: var(--gold-glow);
      border: 1px solid var(--border-strong);
      padding: 0.25rem 0.75rem;
      border-radius: 2px;
    }
    .pairings-note {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .pairings-note i { color: var(--gold-muted); margin-right: 0.35rem; }

    .pairings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .pairing-card {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .pairing-card:hover { border-color: var(--border-strong); }
    .pairing-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.9rem;
      background: rgba(201,168,76,0.05);
      border-bottom: 1px solid var(--border);
    }
    .pairing-group-num {
      font-family: var(--serif-display);
      font-size: 0.8rem;
      color: var(--gold-muted);
      letter-spacing: 0.1em;
    }
    .pairing-tee-tag {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .pairing-players {
      padding: 0.6rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .pairing-player {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.4rem 0.5rem;
      border-radius: 3px;
    }
    .pairing-player:first-child {
      background: rgba(201,168,76,0.06);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: var(--radius);
    }
    .pp-rank {
      font-family: var(--serif-display);
      font-size: 1rem;
      color: var(--gold-pale);
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }
    .pairing-player:first-child .pp-rank { color: var(--gold-bright); }
    .pp-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--white);
      flex: 1;
    }
    .pp-tier {
      font-family: var(--sans);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.1rem 0.35rem;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .pp-tier.ta { background: rgba(201,168,76,0.15); color: var(--gold-bright); border: 1px solid rgba(201,168,76,0.3); }
    .pp-tier.tb { background: rgba(180,180,180,0.1); color: #b0b0b0; border: 1px solid rgba(180,180,180,0.25); }
    .pp-tier.tc { background: rgba(160,100,60,0.12); color: #c07848; border: 1px solid rgba(160,100,60,0.3); }
    .pp-vs { text-align: center; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; margin: 0.1rem 0; }

    .solo-card {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .solo-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      white-space: nowrap;
    }

    .attending-list {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .attending-list-title {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .attending-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .attending-chip {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      font-size: 0.76rem;
      background: var(--navy-card);
      border: 1px solid var(--border);
      color: var(--cream);
    }
    .attending-chip .chip-rank {
      font-family: var(--serif-display);
      font-size: 0.75rem;
      color: var(--gold-muted);
    }

    .pairings-loading {
      padding: 3rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .pairings-loading i { display: block; font-size: 1.5rem; margin-bottom: 0.75rem; color: var(--border-strong); }

    /* Locked placeholder */
    .pairings-locked {
      padding: 4rem 2rem;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--navy-card);
    }
    .pairings-lock-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--gold-glow);
      border: 1px solid var(--border-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.3rem;
      color: var(--gold-muted);
    }
    .pairings-locked h3 {
      font-family: var(--serif-display);
      font-size: 1.3rem;
      color: var(--white);
      letter-spacing: 0.04em;
      margin-bottom: 0.6rem;
    }
    .pairings-locked p {
      font-size: 0.9rem;
      color: var(--muted);
      max-width: 380px;
      margin: 0 auto 1.25rem;
      line-height: 1.6;
    }
    .pairings-locked p strong { color: var(--gold); }
    .pairings-lock-meta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.35rem 0.85rem;
    }
    .pairings-lock-meta i { color: var(--gold-muted); }
    .pairings-lock-meta strong { color: var(--cream); }

    /* ── Premium upsell ── */
    .premium-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0 1.75rem;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .premium-divider::before, .premium-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .premium-section { text-align: center; }
    .premium-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--sans);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }
    .premium-headline {
      font-family: var(--serif-display);
      font-size: 1.5rem;
      color: var(--white);
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }
    .premium-sub {
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 420px;
      margin: 0 auto 2rem;
      line-height: 1.6;
    }

    .premium-plans {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.25rem;
      text-align: left;
    }
    @media (max-width: 700px) { .premium-plans { grid-template-columns: 1fr; } }

    .premium-plan {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .premium-plan.plan-featured {
      border-color: var(--gold-muted);
      background: linear-gradient(160deg, var(--navy-light) 0%, var(--navy) 100%);
    }
    .plan-badge {
      position: absolute;
      top: -1px;
      right: 12px;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--gold);
      color: var(--navy);
      padding: 0.2rem 0.55rem;
      border-radius: 0 0 3px 3px;
    }
    .plan-name {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .plan-price {
      font-family: var(--serif-display);
      font-size: 2rem;
      color: var(--white);
      line-height: 1;
    }
    .plan-featured .plan-price { color: var(--gold-bright); }
    .plan-per {
      font-family: var(--sans);
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 400;
    }
    .plan-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
      min-height: 48px;
    }
    .plan-perks {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin: 0.25rem 0 0.75rem;
      flex: 1;
    }
    .plan-perks li {
      font-size: 0.78rem;
      color: var(--cream);
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .plan-perks li i { font-size: 0.7rem; margin-top: 0.2rem; flex-shrink: 0; color: #72d48a; }
    .plan-perks li i.perk-no { color: #e07878; }

    .plan-btn {
      width: 100%;
      padding: 0.6rem;
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      color: var(--cream);
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .plan-btn:hover { background: rgba(255,255,255,0.06); border-color: var(--muted); }
    .plan-btn-gold {
      background: var(--gold-glow);
      border-color: var(--gold-muted);
      color: var(--gold-bright);
    }
    .plan-btn-gold:hover { background: rgba(201,168,76,0.2); border-color: var(--gold); }

    .premium-fine-print {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.2);
      line-height: 1.6;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Payment modal ── */
    .pay-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .pay-modal-overlay.open { display: flex; }
    .pay-modal {
      background: var(--navy-card);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      margin: 1rem;
      position: relative;
    }
    .pay-modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none; border: none;
      color: var(--muted); font-size: 0.9rem;
      cursor: pointer; transition: color 0.2s;
    }
    .pay-modal-close:hover { color: var(--cream); }
    .pay-modal-header {
      font-family: var(--serif-display);
      font-size: 1.1rem;
      color: var(--white);
      margin-bottom: 0.25rem;
      letter-spacing: 0.04em;
    }
    .pay-modal-plan {
      font-size: 0.78rem;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .pay-field-group { margin-bottom: 1rem; }
    .pay-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .pay-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .pay-input {
      width: 100%;
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.75rem;
      color: var(--cream);
      font-family: var(--sans);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .pay-input:focus { border-color: var(--gold-muted); }
    .pay-submit {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: var(--gold-glow);

<body>
  <div id="header"></div>

  <main>

  </main>

  <div id="footer"></div>

  <script>
  const SHEET_CSV_URL  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSZMDIpncWVdir9q51BOroY_7h27fuXAJJD2fJke7tZePz64r5j9zIBdVhwsj91T9NxhDsSClIcm6l/pub?gid=507810816&single=true&output=csv';
  const SHEET_EDIT_URL = ''; // Optional: paste your normal Google Sheets share URL here

  // Round schedule
  const ROUND_DATES = [
    'May 22','May 29','Jun 5','Jun 12','Jun 19','Jun 26',
    'Jul 3','Jul 10','Jul 17','Jul 24','Jul 31',
    'Aug 7','Aug 14','Aug 21'
  ];
  const ROUND_ISO = [
    '2026-05-22','2026-05-29','2026-06-05','2026-06-12','2026-06-19','2026-06-26',
    '2026-07-03','2026-07-10','2026-07-17','2026-07-24','2026-07-31',
    '2026-08-07','2026-08-14','2026-08-21'
  ];
  const ROUND_LABELS = [
    'Rd 1','Rd 2','Rd 3','Rd 4','Rd 5','Rd 6','Rd 7',
    'Rd 8','Rd 9','Rd 10','Rd 11','Rd 12','Rd 13','Rd 14'
  ];

  // Season rank from prior year — drives pairing order
  // Rank 1 = best (pairs with last), rank 22 = lowest (pairs with first)
  const SEASON_RANK = {
    'Brad Minges': 1,    'Randy Bulach': 2,    'Zak Curry': 3,
    'Steve Griffin': 4,  'Joe McConnell': 5,   'Tony Bulach': 6,
    'Joey Jacobs': 7,    'Brian Creelman': 8,  'Bruce Tedesco': 9,
    'Dave Tracy': 10,    'Hobie Bolton': 11,   'Cody Vatter': 12,
    'James Nelson': 13,  'Mike Tracy': 14,     'Dan Heitman': 15,
    'AJ Meyer': 16,      'Andrew Meyer': 17,   'Dan Hirsch': 18,
    'Daniel Tracy': 19,  'Dave Eads': 20,      'Josh McConnell': 21,
    'Christian Tracy': 22
  };

  const TIER_MAP = {
    'Brad Minges': 'A',    'Randy Bulach': 'A',    'Zak Curry': 'A',
    'Steve Griffin': 'B',  'Joe McConnell': 'B',   'Tony Bulach': 'B',
    'Joey Jacobs': 'B',    'Brian Creelman': 'B',  'Bruce Tedesco': 'B',
    'Dave Tracy': 'B',     'Hobie Bolton': 'B',    'Cody Vatter': 'B',
    'James Nelson': 'B',   'Mike Tracy': 'B',      'Dan Heitman': 'B',
    'AJ Meyer': 'C',       'Andrew Meyer': 'C',    'Dan Hirsch': 'C',
    'Daniel Tracy': 'C',   'Dave Eads': 'C',       'Josh McConnell': 'C',
    'Christian Tracy': 'C'
  };

  // ── Troll number game — always wrong, "correct" answer shifts ──
  let _trollAnswer = Math.floor(Math.random() * 10) + 1;

  function _newTrollAnswer(exclude) {
    let next;
    do { next = Math.floor(Math.random() * 10) + 1; } while (next === exclude);
    return next;
  }

  // ── Premium payment modal (always declines) ───────────────────
  function openPayModal(plan, price) {
    document.getElementById('pay-modal-plan').textContent = `${plan} — ${price}`;
    document.getElementById('pay-decline').style.display = 'none';
    document.getElementById('pay-submit-btn').innerHTML = '<i class="fas fa-lock" style="font-size:0.8rem;"></i> Pay Now';
    document.getElementById('pay-submit-btn').classList.remove('processing');
    document.getElementById('pay-modal').classList.add('open');
  }

  function closePayModal(e) {
    if (e.target === document.getElementById('pay-modal')) {
      document.getElementById('pay-modal').classList.remove('open');
    }
  }

  function closePayModalBtn() {
    document.getElementById('pay-modal').classList.remove('open');
  }

  function submitPayment() {
    const btn = document.getElementById('pay-submit-btn');
    btn.classList.add('processing');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="font-size:0.8rem;"></i> Processing…';
    document.getElementById('pay-decline').style.display = 'none';
    setTimeout(() => {
      btn.classList.remove('processing');
      btn.innerHTML = '<i class="fas fa-lock" style="font-size:0.8rem;"></i> Pay Now';
      document.getElementById('pay-decline').style.display = 'flex';
    }, 2200);
  }

  function trollGuess(btn, n) {
    const result = document.getElementById('lock-game-result');
    if (!result) return;

    // Flash the guessed button red
    btn.classList.add('guessed');

    // Pick a new "correct" answer that is never what they just guessed
    _trollAnswer = _newTrollAnswer(n);
    result.textContent = `Nope! The number was ${_trollAnswer}. Try again.`;

    // Reset the button after a short moment so they can chase the new number
    setTimeout(() => btn.classList.remove('guessed'), 600);
  }

  // ── Tab switching ──────────────────────────────────────────────
  function showRsvpTab(name, btn) {
    document.querySelectorAll('.rsvp-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.rsvp-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
  }

  // ── CSV parser ─────────────────────────────────────────────────
  function parseCSV(text) {
    const rows = [];
    const lines = text.trim().split('\n');
    for (const line of lines) {
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      cols.push(cur.trim());
      rows.push(cols);
    }
    return rows;
  }

  function rsvpCell(val) {
    const v = (val || '').trim();
    const lv = v.toLowerCase();
    if (lv === 'yes')  return `<span class="rsvp-cell rsvp-yes">Yes</span>`;
    if (lv === 'no')   return `<span class="rsvp-cell rsvp-no">No</span>`;
    if (lv === 'ttd')  return `<span class="rsvp-cell rsvp-ttd">TTD</span>`;
    return `<span class="rsvp-empty">—</span>`;
  }

  // ── Pairing algorithm ──────────────────────────────────────────
  // Scores fetched from the same Apps Script as the leaderboard page.
  // calcPlayerAdjAvg mirrors calcPlayer() in leaderboard.html exactly:
  //   raw scores → apply tier hcp → best BEST_N → average.
  // Unscored players use tier placeholder (A=36, B=38, C=40) for sorting,
  // shown as #seasonRank in the display (matching leaderboard grey values).
  // Sort: adj avg asc, season rank as tiebreaker. Pair #1 with #N, #2 with #N-1.

  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyEHPhmfr_2xlsAM_Oa5iZwglbzat0tPl65png1nwsaUgWZ5igzjCp9LiQ0WE804cTW-A/exec';
  const BEST_N   = 6;
  const TIER_PH  = { A: 36, B: 38, C: 40 };
  let   _scoresCache = null;

  async function fetchScores() {
    if (_scoresCache) return _scoresCache;
    try {
      const res  = await fetch(`${APPS_SCRIPT_URL}?action=getScores`);
      const json = await res.json();
      _scoresCache = json.scores || {};
    } catch(e) {
      console.error('Could not load scores:', e);
      _scoresCache = {};
    }
    return _scoresCache;
  }

  function getTierHcp(name) {
    const t = TIER_MAP[name] || 'A';
    return t === 'B' ? 1 : t === 'C' ? 2 : 0;
  }

  function calcPlayerAdjAvg(name, data) {
    const hcp     = getTierHcp(name);
    const rawObj  = data[name] || {};
    // rawObj keys are week indices (0–13); values are raw scores
    const attended = Object.values(rawObj)
      .map(s => parseInt(s))
      .filter(s => s > 0)
      .map(s => s - hcp)
      .sort((a, b) => a - b)
      .slice(0, BEST_N);
    if (attended.length === 0) return null;
    return attended.reduce((a, b) => a + b, 0) / attended.length;
  }

  function buildPairings(attending, scoresData) {
    const withStats = attending.map(name => {
      const avg = calcPlayerAdjAvg(name, scoresData);
      const ph  = TIER_PH[TIER_MAP[name]] ?? 38;
      return {
        name,
        avg,                                    // null if no scores yet
        sortAvg: avg !== null ? avg : ph,       // continuous sort scale
        seasonRank: SEASON_RANK[name] ?? 99
      };
    });

    // Sort to match leaderboard rank: adj avg asc, season rank as tiebreaker
    withStats.sort((a, b) => {
      const diff = Math.round(a.sortAvg * 100) - Math.round(b.sortAvg * 100);
      if (diff !== 0) return diff;
      return a.seasonRank - b.seasonRank;
    });

    const isOdd = withStats.length % 2 === 1;
    const pairs = [];
    let lo = 0, hi = withStats.length - 1;
    while (lo < hi) {
      pairs.push({ players: [withStats[lo], withStats[hi]], type: 'regular' });
      lo++; hi--;
    }
    // Odd player out — plays 2 balls, stays in a regular tee group
    if (lo === hi) {
      pairs.push({ players: [withStats[lo]], type: 'oddout' });
    }

    // Rotation solo applies only when the number of pairs is odd (e.g. 3, 5, 7, 9…
    // pairs — which happens when attending = 6, 10, 14, 18, 22…).
    // An odd pair count means groups of 3 pairs can't divide evenly, so one pair
    // tees off alone. That slot rotates among Minges / Creelman / Tracy.
    const regularPairCount = pairs.filter(p => p.type === 'regular').length;
    if (!isOdd && regularPairCount % 2 === 1) {
      for (const rotationName of SOLO_ROTATION) {
        const idx = pairs.findIndex(
          p => p.type === 'regular' && p.players.some(pl => pl.name === rotationName)
        );
        if (idx !== -1) {
          pairs[idx].type = 'rotation';
          pairs[idx].rotationAnchor = rotationName;
          break;
        }
      }
    }

    return pairs;
  }

  // ── Tee time helpers ──────────────────────────────────────────
  const SOLO_ROTATION = ['Brad Minges', 'Brian Creelman', 'Dave Tracy'];
  const FIRST_TEE_MIN = 9;
  const TEE_INTERVAL  = 9;

  function teeTimeStr(groupIdx) {
    const totalMins = 17 * 60 + FIRST_TEE_MIN + groupIdx * TEE_INTERVAL;
    const h24 = Math.floor(totalMins / 60);
    const m   = totalMins % 60;
    const h12 = h24 > 12 ? h24 - 12 : h24;
    return `${h12}:${String(m).padStart(2, '0')} PM`;
  }

  // Distribute pairs into tee-time groups.
  // - 'rotation' pair → its own middle tee-time slot (Minges/Creelman/Tracy rotation)
  // - 'oddout' pair   → merged into a regular group (plays 2 balls alongside others)
  // - 'regular' pairs → max 2 pairs per tee time (4 players)
  //
  // Tee order is rank-based (deterministic, no shuffle):
  //   pairs[0] = best vs worst; reversed so middle pairs tee FIRST, top pair tees LAST.
  function assignTeeGroups(pairs) {
    const rotationPair = pairs.find(p => p.type === 'rotation') || null;
    const regularPairs = pairs.filter(p => p.type === 'regular');
    const oddOutPair   = pairs.find(p => p.type === 'oddout') || null;

    // Reverse: middle pairs first, #1-vs-last pairing goes last
    const ordered = [...regularPairs].reverse();

    // Merge odd-out player into the last group so they aren't alone
    if (oddOutPair) ordered.push(oddOutPair);

    const n = ordered.length;
    const groups = [];

    // Max 2 pairs per tee group (= 4 players). If the last chunk would be
    // a lonely 1 pair, absorb it into the previous group (group of 3 pairs).
    if (n > 0) {
      for (let i = 0; i < n; i += 2) {
        const remaining = n - (i + 2);
        if (remaining === 1) {
          groups.push(ordered.slice(i, i + 3));
          break;
        }
        groups.push(ordered.slice(i, i + 2));
      }
    }

    // Insert rotation solo into the middle tee slot
    if (rotationPair) {
      const insertAt = Math.ceil(groups.length / 2);
      groups.splice(insertAt, 0, [rotationPair]);
    }

    return groups;
  }

  // ── Pairings time gate: only visible from noon ET on Friday ────
  function pairingsUnlocked() {
    // Convert current time to US Eastern (handles EST/EDT automatically)
    const now = new Date();
    const etStr = now.toLocaleString('en-US', { timeZone: 'America/New_York' });
    const et = new Date(etStr);
    const dayOfWeek = et.getDay();   // 0=Sun … 5=Fri … 6=Sat
    const hour = et.getHours();
    const minute = et.getMinutes();
    // Unlock: Friday (5) at or after 12:00 PM, through end of Saturday (6)
    if (dayOfWeek === 5 && (hour > 12 || (hour === 12 && minute >= 0))) return true;
    if (dayOfWeek === 6) return true;
    return false;
  }

  function minutesUntilUnlock() {
    const now = new Date();
    const etStr = now.toLocaleString('en-US', { timeZone: 'America/New_York' });
    const et = new Date(etStr);
    // Find next Friday noon ET
    const day = et.getDay();
    let daysUntilFri = (5 - day + 7) % 7;
    if (day === 5 && (et.getHours() < 12)) daysUntilFri = 0; // same Friday, not yet noon
    if (day === 5 && et.getHours() >= 12) daysUntilFri = 7;  // already past, next Friday
    if (day === 6) daysUntilFri = 6; // Saturday, next Friday

    const nextFriNoon = new Date(et);
    nextFriNoon.setDate(et.getDate() + daysUntilFri);
    nextFriNoon.setHours(12, 0, 0, 0);
    return Math.ceil((nextFriNoon - et) / 60000);
  }

      // Count actual players in this group (rotation slot has 0 players)
      const playerCount = groupPairs.reduce((sum, p) => sum + p.players.length, 0);

      html += `
        <div class="tee-group">

        html += `</div>`; // close tee-pair
      });

      html += `</div></div>`; // close tee-group-pairs, tee-group
    });

    html += `</div>`; // close tee-groups

    // ── Attending / not attending summary ──────────────────────

      });
      html += `</div>`;
    }

    html += `</div>`;
    wrap.innerHTML = html;
  }

  // ── Main load ──────────────────────────────────────────────────
  async function loadRSVP() {
    const wrap     = document.getElementById('rsvp-table-wrap');
    const updated  = document.getElementById('rsvp-updated');
    const sheetBtn = document.getElementById('sheet-link');

    if (SHEET_EDIT_URL) {
      sheetBtn.href = SHEET_EDIT_URL;
    } else {
      sheetBtn.style.display = 'none';
    }

    try {
      const res = await fetch(SHEET_CSV_URL + '&t=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const rows = parseCSV(text);
      if (rows.length < 3) throw new Error('Unexpected sheet structure');

      // rows[0] = column headers (Rank/Count/Player/May 22…)
      // Player data starts at rows[1] — CSV has only one header row
      const headerRow = rows[0];

      // Find championship column — header says "Aug 22" not "Championship"
      let champCol = -1;
      for (let c = headerRow.length - 1; c >= 0; c--) {
        const h = (headerRow[c] || '').toLowerCase();
        if (h.includes('champion') || h.includes('aug 22') || h.includes('aug22')) { champCol = c; break; }
      }

      // Round columns: col 3 up to champCol (exclusive)
      // Sheet layout: A=Rank(0), B=Count(1), C=Player(2), D+=RSVP dates starting at index 3
      const roundCols = [];
      const endCol = champCol > 0 ? champCol : headerRow.length;
      for (let c = 3; c < endCol; c++) roundCols.push(c);

      // Split player vs footer rows
      const playerRows = [], footerRows = [];
      let inFooter = false;
      for (let r = 1; r < rows.length; r++) {
        const nameCell = (rows[r][2] || '').trim();
        if (nameCell && (nameCell.toLowerCase().startsWith('count') || nameCell.toLowerCase().startsWith('remaining'))) {
          inFooter = true;
        }
        if (inFooter) { if (nameCell) footerRows.push(rows[r]); }
        else          { if (nameCell) playerRows.push(rows[r]); }
      }

      // Render pairings (uses same parsed data)
      renderPairings(playerRows, roundCols);

      // ── Build RSVP table ───────────────────────────────────────
      let thead = '<thead><tr>';
      thead += `<th class="col-count">Cnt</th><th class="col-player">Player</th>`;
      roundCols.forEach((col, i) => { thead += `<th>${ROUND_LABELS[i] || `Rd ${i+1}`}</th>`; });
      if (champCol > 0) thead += `<th class="col-champ">Champ</th>`;
      thead += '</tr><tr class="date-row">';
      thead += `<th class="col-player" colspan="2">Indian Ridge Golf Club</th>`;
      roundCols.forEach((col, i) => { thead += `<th>${ROUND_DATES[i] || ''}</th>`; });
      if (champCol > 0) thead += `<th>Aug 22</th>`;
      thead += '</tr></thead>';

      let tbody = '<tbody>';
      playerRows.forEach(row => {
        const count = (row[1] || '').trim();
        const name  = (row[2] || '').trim();
        if (!name) return;
        tbody += `<tr><td class="col-count">${count || '—'}</td><td class="col-player">${name}</td>`;
        roundCols.forEach(col => { tbody += `<td>${rsvpCell((row[col] || '').trim())}</td>`; });
        if (champCol > 0) tbody += `<td class="col-champ-cell">${rsvpCell((row[champCol] || '').trim())}</td>`;
        tbody += '</tr>';
      });
      tbody += '</tbody>';

      let tfoot = '<tfoot>';
      footerRows.forEach(frow => {
        const label = (frow[2] || '').trim();
        if (!label) return;
        const cls = label.toLowerCase().includes('yes') ? 'count-yes' : label.toLowerCase().includes('no') ? 'count-no' : 'count-open';
        tfoot += `<tr><td></td><td class="col-player ${cls}">${label}</td>`;
        roundCols.forEach(col => { tfoot += `<td class="${cls}">${(frow[col] || '').trim() || '—'}</td>`; });
        if (champCol > 0) tfoot += `<td class="${cls} col-champ-cell">${(frow[champCol] || '').trim() || '—'}</td>`;
        tfoot += '</tr>';
      });
      tfoot += '</tfoot>';

      wrap.innerHTML = `<table class="rsvp-table">${thead}${tbody}${tfoot}</table>`;
      updated.textContent = `Updated ${new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;

    } catch (err) {
      console.error('RSVP load failed:', err);
      document.getElementById('pairings-wrap').innerHTML = `<div class="pairings-loading"><i class="fas fa-exclamation-triangle" style="color:var(--gold-muted);"></i>Couldn't load data — check sheet URL.</div>`;
      wrap.innerHTML = `<div class="rsvp-state"><i class="fas fa-exclamation-triangle" style="color:var(--gold-muted);"></i><p>Couldn't load RSVP data.<br>Check that the sheet is published and the URL is correct.</p></div>`;
    }
  }

  document.addEventListener('DOMContentLoaded', loadRSVP);

  // ── Snapshot ────────────────────────────────────────────────────
  async function copyPairingsSnapshot() {
    const btn = document.getElementById('pairings-snapshot-btn');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

    // Capture just the tee groups grid, not the attending list
    const target = document.getElementById('tee-groups-capture');
    if (!target) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-camera"></i> Copy Snapshot';
      return;
    }

    try {
      const canvas = await html2canvas(target, {
        backgroundColor: '#0b1120',
        scale: 2,
        useCORS: true,
        logging: false
      });

      try {
        canvas.toBlob(async blob => {
          await navigator.clipboard.write([
            new ClipboardItem({ 'image/png': blob })
          ]);
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-camera"></i> Copy Snapshot';
            btn.classList.remove('copied');
          }, 2500);
        }, 'image/png');
      } catch(clipErr) {
        // Fallback: download
        const link = document.createElement('a');
        link.download = `owga-pairings-${new Date().toISOString().slice(0,10)}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-camera"></i> Copy Snapshot';
      }
    } catch(err) {
      console.error('Snapshot failed:', err);
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-camera"></i> Copy Snapshot';
      alert('Snapshot failed — try again.');
    }
  }
